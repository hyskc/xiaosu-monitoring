# 应用名称
spring.application.name=xiaosuserver

# 服务器端口
server.port=8082

# 文件上传设置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# 日志设置
logging.level.com.example.xiaosuserver=DEBUG
logging.level.org.springframework.web=INFO

# 文件存储路径（相对于应用程序运行目录）
app.upload.dir=${user.dir}/file

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/xiaosudb?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
